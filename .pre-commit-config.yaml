repos:
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        files: ^(src|tests)/.*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.0
    hooks:
      - id: mypy
        files: ^src/.*\.py$
        additional_dependencies:
          - types-PyYAML

  - repo: local
    hooks:
      - id: pytest
        name: pytest-smoke
        entry: pytest -q --override-ini addopts= tests/test_smoke.py
        language: system
        pass_filenames: false
