<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pipeworks-dev-notes</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-header__title">pipeworks-dev-notes</h1>
      <button id="theme-toggle" class="btn btn--secondary" type="button">Toggle Theme</button>
    </header>

    <main class="app-main">
      <section class="panel panel--dark">
        <div class="panel__header">
          <h2 class="panel__title">Shared Notes</h2>
          <button id="new-note" class="btn btn--secondary" type="button">New</button>
        </div>
        <p class="panel__desc">Metadata-driven index across shared cross-repo notes.</p>
        <ul id="note-list" class="note-list" aria-label="Shared notes"></ul>
      </section>

      <section class="panel panel--elevated">
        <div class="panel__header">
          <h2 id="note-title" class="panel__title">Note Editor</h2>
          <button id="save-note" class="btn btn--primary" type="button">Save</button>
        </div>
        <p id="note-meta" class="panel__meta">Create a note or select one to edit.</p>

        <form id="note-form" class="note-form" autocomplete="off">
          <div class="form-grid">
            <label class="field">
              <span class="field__label">Canonical Repo</span>
              <select id="field-canonical" class="field__input"></select>
            </label>
            <label class="field">
              <span class="field__label">Title</span>
              <input id="field-title" class="field__input" type="text" placeholder="Chat User LLM Systems" />
            </label>
            <label class="field">
              <span class="field__label">Filename</span>
              <input id="field-filename" class="field__input" type="text" placeholder="chat-user-llm-systems.md" />
            </label>
            <label class="field">
              <span class="field__label">Owner</span>
              <input id="field-owner" class="field__input" type="text" placeholder="aapark" />
            </label>
            <label class="field">
              <span class="field__label">Status</span>
              <input id="field-status" class="field__input" type="text" placeholder="draft" />
            </label>
            <label class="field">
              <span class="field__label">Risk</span>
              <input id="field-risk" class="field__input" type="text" placeholder="medium" />
            </label>
            <label class="field">
              <span class="field__label">Last Reviewed</span>
              <input id="field-reviewed" class="field__input" type="date" />
            </label>
            <label class="field field--wide">
              <span class="field__label">Impacted Repos (comma-separated)</span>
              <input
                id="field-impacted"
                class="field__input"
                type="text"
                placeholder="pipeworks_axis_descriptor_lab, pipeworks_image_generator"
              />
            </label>
          </div>

          <label class="field field--wide">
            <span class="field__label">Markdown Content</span>
            <textarea id="field-content" class="field__textarea" rows="14"></textarea>
          </label>
        </form>
      </section>
    </main>

    <footer class="status-bar">
      <span id="status-text" class="status-bar__text">Ready</span>
    </footer>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
